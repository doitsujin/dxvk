name: Build macOS (D3D9)

on: [push, pull_request, workflow_dispatch]

jobs:
  build-macos:
    strategy:
      matrix:
        arch: [arm64, x86_64]
        include:
          - arch: arm64
            runner: macos-14   # Apple Silicon
          - arch: x86_64
            runner: macos-13   # Intel

    runs-on: ${{ matrix.runner }}
    name: macOS ${{ matrix.arch }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Install dependencies
      run: |
        brew install meson ninja glslang sdl2 sdl3 molten-vk vulkan-headers spirv-headers

    - name: Verify MoltenVK / Vulkan loader
      run: |
        echo "=== MoltenVK (Homebrew) ==="
        brew info molten-vk || true
        for lib in \
          /opt/homebrew/lib/libMoltenVK.dylib \
          /usr/local/lib/libMoltenVK.dylib \
          /opt/homebrew/lib/libvulkan.dylib \
          /usr/local/lib/libvulkan.dylib; do
          if [ -f "$lib" ]; then
            echo "Found: $lib"
            file "$lib"
          fi
        done

    - name: Get version
      id: get-version
      run: |
        echo "VERSION_NAME=${GITHUB_REF##*/}-${GITHUB_SHA::8}" >> $GITHUB_ENV

    - name: Build D3D9 native (${{ matrix.arch }})
      run: |
        ./package-native.sh ${{ env.VERSION_NAME }} build \
          --no-package --dev-build --arch ${{ matrix.arch }}

    - name: Verify built libraries
      run: |
        echo "=== Built files ==="
        find build/ -name "*.dylib" -o -name "*.so" | head -20
        echo "=== Library architectures ==="
        for f in $(find build/ -name "*.dylib" 2>/dev/null); do
          echo "$f:"
          file "$f"
        done

    - name: Smoke test d3d9-clear sample
      run: |
        LIB_DIR=$(find build -path '*/usr/lib' -type d 2>/dev/null | head -1)
        if [ -z "$LIB_DIR" ] || [ ! -x "$LIB_DIR/d3d9-clear" ]; then
          echo "d3d9-clear binary not found under build/*/usr/lib"
          find build -name 'd3d9-clear*' 2>/dev/null || true
          exit 1
        fi
        BREW_PREFIX="$(brew --prefix)"
        export DYLD_LIBRARY_PATH="$LIB_DIR:$BREW_PREFIX/lib${DYLD_LIBRARY_PATH:+:$DYLD_LIBRARY_PATH}"

        for icd in \
          "$BREW_PREFIX/share/vulkan/icd.d/MoltenVK_icd.json" \
          /opt/homebrew/share/vulkan/icd.d/MoltenVK_icd.json \
          /usr/local/share/vulkan/icd.d/MoltenVK_icd.json; do
          if [ -f "$icd" ]; then
            export VK_ICD_FILENAMES="$icd"
            export VK_DRIVER_FILES="$icd"
            echo "Using MoltenVK ICD: $icd"
            break
          fi
        done

        export DXVK_LOG_LEVEL=info
        export MVK_CONFIG_USE_METAL_ARGUMENT_BUFFERS=0

        # Run one smoke binary. The binary forces its own DXVK_WSI_DRIVER, so we
        # only need to point at the right executable. Returns 0 on success or on
        # a known runner-GPU capability gap; non-zero on a real failure.
        run_smoke() {
          local binary="$1"
          local bin_path="$LIB_DIR/$binary"
          if [ ! -x "$bin_path" ]; then
            echo "::warning::$binary not built; skipping its smoke test."
            return 0
          fi
          echo "=== Smoke test: $binary ==="
          local log="$RUNNER_TEMP/$binary.log"
          set +e
          "$bin_path" 3 2>&1 | tee "$log"
          local status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            if grep -Eq "DXVK: No adapters found|required feature 'geometryShader'|Vulkan 1\\.3 capable setup is required" "$log"; then
              echo "Skipping $binary smoke test: GitHub macOS runner GPU lacks required Vulkan features."
              return 0
            fi
            return "$status"
          fi
          return 0
        }

        # SDL2 binary is required; the SDL3 binary is best-effort (only built
        # when the sdl3 dependency is present).
        run_smoke d3d9-clear
        run_smoke d3d9-clear-sdl3

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: spockd3d9-macos-${{ matrix.arch }}-${{ env.VERSION_NAME }}
        path: build/spockd3d9-${{ env.VERSION_NAME }}/
        if-no-files-found: warn
